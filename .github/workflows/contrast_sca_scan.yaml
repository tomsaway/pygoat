name: Contrast SCA Scan Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master

jobs:
  contrast-sca:
    runs-on: ubuntu-22.04

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Contrast SCA Action
        uses: Contrast-Security-OSS/contrast-sca-action@v3
        with:
          apiKey: ${{ secrets.CONTRAST__API_KEY }}
          authHeader: ${{ secrets.CONTRAST_GITHUB_APP_AUTH_HEADER }}
          orgId: ${{ secrets.CONTRAST__ORG_ID }}
          apiUrl: ${{ secrets.CONTRAST__API_URL }}
          filePath: ${{ matrix.manifest.filePath }}
          repositoryId: ${{ matrix.manifest.repositoryId }}
          projectGroupId: ${{ matrix.manifest.projectGroupId }}
