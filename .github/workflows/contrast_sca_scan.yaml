name: Contrast SCA Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contrast-sca:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Change if you want another version

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Contrast SCA Action
        uses: Contrast-Security-OSS/contrast-sca-action@v2
        with:
          apiKey: ${{ secrets.CONTRAST__API_KEY }}
          orgId: ${{ secrets.CONTRAST__ORG_ID }}
          apiUrl: ${{ secrets.CONTRAST__API_URL }}
          # Add any additional options as needed
